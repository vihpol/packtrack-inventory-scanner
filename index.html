<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Box Scan Inventory Demo</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./app.js?v=simple-scan-demo" defer></script>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">REST API demo</p>
        <h1>Scan a box. Inventory updates.</h1>
      </section>

      <section class="demo-grid">
        <article class="scanner-card">
          <div class="card-heading">
            <h2>Scanner</h2>
            <button id="cameraButton" type="button">Camera</button>
          </div>

          <div class="camera-frame">
            <video id="cameraPreview" playsinline muted></video>
            <div id="cameraPlaceholder">Scan BOX-1001</div>
          </div>

          <form id="scanForm">
            <label for="scanInput">Box barcode or QR value</label>
            <div class="scan-row">
              <input id="scanInput" autocomplete="off" value="BOX-1001" />
              <button type="submit">Scan</button>
            </div>
          </form>

          <div id="status" class="status">Ready.</div>
        </article>

        <article class="qr-card">
          <h2>Demo box QRs</h2>
          <div id="qrList" class="qr-list"></div>
        </article>
      </section>

      <section class="inventory-card">
        <div class="card-heading">
          <div>
            <h2>Inventory</h2>
            <p>These counts change immediately after the box is scanned.</p>
          </div>
          <button id="resetButton" type="button">Reset Demo</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>Item</th>
              <th>Barcode</th>
              <th>Available</th>
            </tr>
          </thead>
          <tbody id="inventoryBody"></tbody>
        </table>
      </section>

      <section class="log-card">
        <h2>Last scan</h2>
        <div id="scanLog">No box scanned yet.</div>
      </section>
    </main>
  </body>
</html>
