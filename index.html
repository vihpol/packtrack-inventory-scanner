<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Scan Inventory Demo</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./app.js?v=simple-scan-demo" defer></script>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">REST API demo</p>
        <h1>Scan a product. Inventory updates.</h1>
      </section>

      <section class="demo-grid">
        <article class="scanner-card">
          <div class="card-heading">
            <h2>Scanner</h2>
            <button id="cameraButton" type="button">Camera</button>
          </div>

          <div class="camera-frame">
            <video id="cameraPreview" playsinline muted></video>
            <div id="cameraPlaceholder">Scan product barcode</div>
          </div>

          <form id="scanForm">
            <label for="scanInput">Product barcode or QR value</label>
            <div class="scan-row">
              <input id="scanInput" autocomplete="off" placeholder="Scan real product barcode" />
              <button type="submit">Scan</button>
            </div>
          </form>

          <div id="status" class="status">Ready.</div>
        </article>

        <article class="scanner-card">
          <h2>Add real product</h2>
          <form id="productForm">
            <label for="productBarcode">Barcode from product label</label>
            <input id="productBarcode" autocomplete="off" placeholder="Scan or type barcode" required />

            <label for="productName">Product name</label>
            <input id="productName" placeholder="Product name" required />

            <label for="productQuantity">Starting quantity</label>
            <input id="productQuantity" min="0" type="number" value="10" required />

            <button type="submit">Add Product</button>
          </form>
        </article>
      </section>

      <section class="inventory-card">
        <div class="card-heading">
          <div>
            <h2>Inventory</h2>
            <p>Scan a registered product barcode and the count changes immediately.</p>
          </div>
          <button id="resetButton" type="button">Reset Demo</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>Item</th>
              <th>Barcode</th>
              <th>Available</th>
            </tr>
          </thead>
          <tbody id="inventoryBody"></tbody>
        </table>
      </section>

      <section class="log-card">
        <h2>Last scan</h2>
        <div id="scanLog">No product scanned yet.</div>
      </section>
    </main>
  </body>
</html>
